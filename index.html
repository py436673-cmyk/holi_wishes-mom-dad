<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Holi, My Love!</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Poppins:wght@300;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --primary: #ff007f;
            --secondary: #8a2be2;
            --accent: #ffae00;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(-45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            overflow: hidden;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Glassmorphism Card */
        .card {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 30px;
            padding: 50px 30px;
            width: 90%;
            max-width: 450px;
            text-align: center;
            box-shadow: 0 25px 45px rgba(0,0,0,0.2);
            position: relative;
            z-index: 2;
            animation: fadeIn 2s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Elegant Photo Frame */
        .photo-container {
            position: relative;
            width: 180px;
            height: 180px;
            margin: 0 auto 30px;
        }

        .photo-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 50%;
            border: 5px solid white;
            box-shadow: 0 0 20px rgba(255,255,255,0.5);
        }

        .photo-decoration {
            position: absolute;
            top: -10px;
            left: -10px;
            right: -10px;
            bottom: -10px;
            border-radius: 50%;
            border: 2px dashed rgba(255,255,255,0.6);
            animation: rotate 10s linear infinite;
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        h1 {
            font-family: 'Dancing Script', cursive;
            font-size: 3.5rem;
            color: white;
            margin-bottom: 10px;
            text-shadow: 2px 4px 10px rgba(0,0,0,0.2);
        }

        p {
            color: white;
            font-weight: 300;
            letter-spacing: 1px;
            margin-bottom: 30px;
            opacity: 0.9;
        }

        .btn-surprise {
            background: white;
            color: var(--primary);
            padding: 15px 40px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 600;
            border: none;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }

        .btn-surprise:hover {
            transform: scale(1.05);
            background: var(--accent);
            color: white;
        }

        /* Floating particles */
        .particle {
            position: absolute;
            border-radius: 50%;
            pointer-events: none;
            z-index: 1;
        }

    </style>
</head>
<body>

    <div class="card">
        <div class="photo-container">
            <div class="photo-decoration"></div>
            <img src="WhatsApp Image 2026-03-04 at 12.29.38 AM.jpeg" alt="Beautiful">
            
        </div>
        
        <h1>Happy Holi!</h1>
        <p>To the girl who fills my life with every color of the rainbow. ❤️</p>
        
        <button class="btn-surprise" onclick="celebrate()">Click for Magic ✨</button>
    </div>

    <script>
        // Confetti effect
        function celebrate() {
            var duration = 5 * 1000;
            var animationEnd = Date.now() + duration;
            var defaults = { startVelocity: 30, spread: 360, ticks: 60, zIndex: 0 };

            function randomInRange(min, max) {
              return Math.random() * (max - min) + min;
            }

            var interval = setInterval(function() {
              var timeLeft = animationEnd - Date.now();

              if (timeLeft <= 0) {
                return clearInterval(interval);
              }

              var particleCount = 50 * (timeLeft / duration);
              confetti(Object.assign({}, defaults, { particleCount, origin: { x: randomInRange(0.1, 0.3), y: Math.random() - 0.2 } }));
              confetti(Object.assign({}, defaults, { particleCount, origin: { x: randomInRange(0.7, 0.9), y: Math.random() - 0.2 } }));
            }, 250);
        }

        // Create floating "Gulal" particles
        function createParticles() {
            const colors = ['#FFC0CB', '#FFD700', '#ADFF2F', '#00FFFF', '#FF69B4'];
            for(let i=0; i<20; i++) {
                let p = document.createElement('div');
                p.className = 'particle';
                let size = Math.random() * 50 + 10 + 'px';
                p.style.width = size;
                p.style.height = size;
                p.style.background = colors[Math.floor(Math.random() * colors.length)];
                p.style.opacity = '0.4';
                p.style.filter = 'blur(10px)';
                p.style.top = Math.random() * 100 + 'vh';
                p.style.left = Math.random() * 100 + 'vw';
                
                document.body.appendChild(p);
                
                // Animate floating
                p.animate([
                    { transform: 'translateY(0) translateX(0)' },
                    { transform: `translateY(-${Math.random() * 100}px) translateX(${Math.random() * 50}px)` }
                ], {
                    duration: Math.random() * 3000 + 2000,
                    iterations: Infinity,
                    direction: 'alternate'
                });
            }
        }
        createParticles();
    </script>
</body>
</html>
